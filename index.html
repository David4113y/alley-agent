<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alleyesonme-Ai</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="dark-theme">
    <div class="container">
        <header>
            <div class="logo-icon">A</div>
            <h1>Alleyesonme-Ai</h1>
            <p>Your personal AI assistant — powered by advanced AI.</p>
        </header>

        <main>
            <div class="chat-input-container">
                <input type="text" id="userInput" placeholder="Ask me anything! I'm here to help">
                <button id="sendBtn" class="gradient-btn">→</button>
            </div>

            <div class="action-grid">
                <div class="action-card"><span>💪</span> Create a workout plan</div>
                <div class="action-card"><span>✈️</span> Help me plan a trip</div>
                <div class="action-card"><span>💰</span> Write a business plan</div>
                <div class="action-card"><span>📝</span> Write a cover letter</div>
            </div>
        </main>
    </div>
    <script src="js/main.js"></script>
</body>
</html>
