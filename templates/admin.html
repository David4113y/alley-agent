<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: monospace; padding: 40px; }
        .card { border: 2px solid #ffcc00; padding: 25px; margin-bottom: 30px; border-radius: 12px; max-width: 600px; background: #111; }
        input { background: #1a1a1a; border: 1px solid #444; color: #ffcc00; padding: 12px; width: 100%; margin: 10px 0; border-radius: 6px; box-sizing: border-box; }
        button { background: #ffcc00; color: #000; padding: 12px 24px; border: none; cursor: pointer; font-weight: bold; border-radius: 6px; width: 100%; }
        h2, h3 { color: #ffcc00; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>
    <h2>Empire Command Center</h2>
    <a href="/" style="color:#888; text-decoration:none;"><- Return to Dashboard</a>
    <hr style="border: 1px solid #222; margin: 20px 0;">

    <div class="card">
        <h3>Admin Sovereignty</h3>
        <p><small>Update your master credentials.</small></p>
        <form action="/update_admin" method="POST">
            <input type="text" name="username" placeholder="New Admin Username" required>
            <input type="password" name="password" placeholder="New Admin Password" required>
            <button type="submit">Update Admin Identity</button>
        </form>
    </div>

    <div class="card">
        <h3>VIP Hospitality Settings</h3>
        <p><small>Manage credentials for family and friends (Free Access).</small></p>
        <form action="/update_vip" method="POST">
            <input type="text" name="vip_user" placeholder="VIP Guest Username" required>
            <input type="text" name="vip_pass" placeholder="VIP Guest Password" required>
            <button type="submit">Deploy VIP Credentials</button>
        </form>
    </div>
</body>
</html>
