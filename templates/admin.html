<!DOCTYPE html>
<html>
<body style="background:#121212; color:white; font-family:sans-serif; padding:40px;">
    <h2>Alley Empire Command Center</h2>
    <a href="/" style="color:#ffcc00;">← Return to Agent</a>
    <hr>
    <h3>Manage Credentials</h3>
    <form action="/update_admin" method="POST" style="margin-bottom:20px;">
        <input type="text" name="username" placeholder="New Admin Username">
        <input type="password" name="password" placeholder="New Admin Password">
        <button type="submit">Update Admin</button>
    </form>
    
    <form action="/update_vip" method="POST">
        <input type="text" name="vip_user" placeholder="VIP Username">
        <input type="text" name="vip_code" placeholder="VIP Access Code">
        <button type="submit">Update VIP Guest</button>
    </form>
</body>
</html>
