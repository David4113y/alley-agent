<!DOCTYPE html>
<html>
<head>
    <title>Alley Agents | Urban Sovereignty</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #050505; color: #ffcc00; font-family: monospace; overflow: hidden; touch-action: none; }
        canvas { display: block; background: linear-gradient(#0a0a0a, #1a1a1a); margin: auto; }
        .ui { position: absolute; bottom: 20px; left: 20px; font-size: 18px; text-shadow: 2px 2px #000; pointer-events: none; }
        .controls { position: absolute; bottom: 20px; right: 20px; display: flex; gap: 10px; }
        .btn { width: 60px; height: 60px; background: rgba(255, 204, 0, 0.2); border: 2px solid #ffcc00; border-radius: 10px; color: #ffcc00; font-weight: bold; display: flex; align-items: center; justify-content: center; user-select: none; }
    </style>
</head>
<body>
    <div class="ui">CREDITS: <span id="score">0</span></div>
    <canvas id="gameCanvas"></canvas>
    <div class="controls">
        <div class="btn" id="leftBtn">L</div>
        <div class="btn" id="rightBtn">R</div>
        <div class="btn" id="jumpBtn">JUMP</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const gravity = 0.8;
        const player = { x: 50, y: 300, width: 30, height: 50, dy: 0, speed: 5, jumping: false };
        const platforms = [{x: 0, y: 500, w: 2000, h: 50}, {x: 300, y: 400, w: 150, h: 20}, {x: 550, y: 320, w: 150, h: 20}];
        let keys = {};

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw City Background (Simple silhouettes)
            ctx.fillStyle = "#0a0a0a";
            ctx.fillRect(100, 200, 100, 300); ctx.fillRect(300, 150, 80, 350);

            // Draw Platforms
            ctx.fillStyle = "#333";
            platforms.forEach(p => ctx.fillRect(p.x, p.y, p.w, p.h));

            // Draw Player (The Agent)
            ctx.fillStyle = "#ffcc00";
            ctx.fillRect(player.x, player.y, player.width, player.height);

            // Physics
            if (keys['ArrowRight'] || keys['right']) player.x += player.speed;
            if (keys['ArrowLeft'] || keys['left']) player.x -= player.speed;
            
            player.dy += gravity;
            player.y += player.dy;

            platforms.forEach(p => {
                if (player.x < p.x + p.w && player.x + player.width > p.x && player.y + player.height > p.y && player.y + player.height < p.y + p.h) {
                    player.y = p.y - player.height;
                    player.dy = 0;
                    player.jumping = false;
                }
            });

            requestAnimationFrame(draw);
        }

        // Controls Logic
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);
        
        const setupBtn = (id, key) => {
            const btn = document.getElementById(id);
            btn.addEventListener('touchstart', () => keys[key] = true);
            btn.addEventListener('touchend', () => keys[key] = false);
            btn.addEventListener('mousedown', () => keys[key] = true);
            btn.addEventListener('mouseup', () => keys[key] = false);
        };
        setupBtn('leftBtn', 'left'); setupBtn('rightBtn', 'right');
        document.getElementById('jumpBtn').onclick = () => { if(!player.jumping){ player.dy = -15; player.jumping = true; }};

        draw();
    </script>
</body>
</html>
