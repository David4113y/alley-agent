<!DOCTYPE html>
<html>
<head>
    <title>Alley Agents | Retro City</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #050505; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; background: linear-gradient(#0a0a2e, #1a1a1a); margin: 0 auto; border: 2px solid #333; }
        #ui { position: absolute; top: 10px; left: 10px; color: #0f0; text-shadow: 2px 2px #000; }
        .controls { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: space-around; pointer-events: none; }
        .btn { width: 70px; height: 70px; background: rgba(255,255,255,0.1); border: 2px solid #fff; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; pointer-events: auto; user-select: none; }
    </style>
</head>
<body>
    <div id="ui">Agent: DAVIDALLEY | Score: <span id="score">0</span></div>
    <canvas id="gameCanvas"></canvas>
    
    <div class="controls">
        <div class="btn" id="left">←</div>
        <div class="btn" id="jump">JUMP</div>
        <div class="btn" id="right">→</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const player = {
            x: 50, y: 100, width: 30, height: 45,
            color: '#00ffcc', dy: 0, speed: 5,
            jumpPower: 12, grounded: false
        };

        const gravity = 0.6;
        const platforms = [
            { x: 0, y: canvas.height - 50, w: canvas.width, h: 50 }, // Floor
            { x: 100, y: canvas.height - 150, w: 200, h: 20 },
            { x: 400, y: canvas.height - 250, w: 200, h: 20 },
            { x: 150, y: canvas.height - 350, w: 150, h: 20 }
        ];

        const keys = {};
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        // Touch Controls
        document.getElementById('left').ontouchstart = () => keys['ArrowLeft'] = true;
        document.getElementById('left').ontouchend = () => keys['ArrowLeft'] = false;
        document.getElementById('right').ontouchstart = () => keys['ArrowRight'] = true;
        document.getElementById('right').ontouchend = () => keys['ArrowRight'] = false;
        document.getElementById('jump').ontouchstart = () => { if(player.grounded) player.dy = -player.jumpPower; };

        function update() {
            if (keys['ArrowLeft']) player.x -= player.speed;
            if (keys['ArrowRight']) player.x += player.speed;
            if (keys['Space'] && player.grounded) player.dy = -player.jumpPower;

            player.dy += gravity;
            player.y += player.dy;
            player.grounded = false;

            platforms.forEach(p => {
                if (player.x < p.x + p.w && player.x + player.width > p.x &&
                    player.y < p.y + p.h && player.y + player.height > p.y) {
                    if (player.dy > 0) {
                        player.y = p.y - player.height;
                        player.dy = 0;
                        player.grounded = true;
                    }
                }
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw City Buildings (Background)
            ctx.fillStyle = '#0f0f1f';
            ctx.fillRect(50, canvas.height - 300, 80, 250);
            ctx.fillRect(250, canvas.height - 400, 100, 350);

            // Draw Platforms
            ctx.fillStyle = '#333';
            platforms.forEach(p => ctx.fillRect(p.x, p.y, p.w, p.h));

            // Draw Agent
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.width, player.height);
            ctx.strokeStyle = '#fff';
            ctx.strokeRect(player.x, player.y, player.width, player.height);
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
