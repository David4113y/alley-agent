<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Alleyesonme-Ai</title>
    <style>
        body { margin: 0; background: #0f172a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-card { background: #1e293b; padding: 40px; border-radius: 16px; width: 320px; text-align: center; }
        .logo { background: #3b82f6; width: 50px; height: 50px; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-weight: bold; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: linear-gradient(90deg, #3b82f6, #8b5cf6); border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .error-msg { color: #ef4444; font-size: 0.8rem; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">A</div>
        <h2>Alleyesonme-Ai</h2>
        <p style="color: #94a3b8;">Sign in to continue</p>
        <div id="errorBox" class="error-msg"></div>
        <input type="text" id="username" placeholder="USERNAME">
        <input type="password" id="password" placeholder="PASSWORD">
        <button onclick="performLogin()">Sign In</button>
        <p style="font-size: 0.8rem; margin-top: 20px;"><a href="/" style="color: #60a5fa; text-decoration: none;">← Back to Home</a></p>
    </div>

    <script>
        async function performLogin() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const err = document.getElementById('errorBox');

            const res = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: u, password: p })
            });

            const data = await res.json();
            if (data.status === 'success') {
                alert(data.message);
                window.location.href = '/';
            } else {
                err.style.display = 'block';
                err.innerText = data.message;
                alert("Login Failed: " + data.message);
            }
        }
    </script>
</body>
</html>
