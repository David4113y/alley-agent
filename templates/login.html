<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Alleyesonme-Ai</title>
    <style>
        body {
            margin: 0;
            background: #0f172a;
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-card {
            background: #1e293b;
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 350px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .logo {
            background: #3b82f6;
            width: 50px;
            height: 50px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-weight: bold;
            font-size: 1.5rem;
        }
        h2 { color: #60a5fa; margin-bottom: 5px; }
        p { color: #94a3b8; font-size: 0.9rem; margin-bottom: 25px; }
        .input-group { text-align: left; margin-bottom: 15px; }
        label { display: block; font-size: 0.75rem; color: #94a3b8; margin-bottom: 5px; letter-spacing: 1px; }
        input {
            width: 100%;
            padding: 12px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
        }
        .sign-in-btn {
            width: 100%;
            padding: 14px;
            margin-top: 20px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .footer-links { margin-top: 20px; font-size: 0.8rem; color: #94a3b8; }
        .footer-links a { color: #60a5fa; text-decoration: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">A</div>
        <h2>Alleyesonme-Ai</h2>
        <p>Sign in to continue</p>
        
        <form id="loginForm">
            <div class="input-group">
                <label>USERNAME</label>
                <input type="text" id="username" placeholder="Enter username" required>
            </div>
            <div class="input-group">
                <label>PASSWORD</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="sign-in-btn">Sign In</button>
        </form>

        <div class="footer-links">
            Don't have an account? <a href="#">Register</a><br><br>
            <a href="/">← Back to Home</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;

            const res = await fetch('/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: u, password: p})
            });
            const data = await res.json();

            if (data.status === 'success') {
                alert(data.message);
                window.location.href = '/'; // Redirect home after login
            } else {
                alert("Login Failed: " + data.message);
            }
        };
    </script>
</body>
</html>
