<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alley Empire | Digital Sovereignty Engine</title>
    <style>
        :root {
            --primary-yellow: #ffcc00;
            --bg-dark: #121212;
            --text-light: #e0e0e0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Membership Yellow Box */
        #membership-container {
            width: 90%;
            max-width: 600px;
            background-color: var(--primary-yellow);
            color: black;
            padding: 15px;
            margin: 20px 0;
            border-radius: 12px;
            text-align: center;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(255, 204, 0, 0.3);
        }

        #membership-text {
            margin: 0;
            font-size: 1.3rem;
            transition: opacity 0.5s ease;
        }

        /* Floating Menu */
        .menu-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: #333;
            border: 2px solid var(--primary-yellow);
            color: white;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            z-index: 1000;
        }

        .dropdown-content {
            display: none;
            position: fixed;
            top: 65px;
            left: 20px;
            background-color: #1e1e1e;
            min-width: 160px;
            border: 1px solid var(--primary-yellow);
            border-radius: 8px;
            z-index: 1000;
        }

        .dropdown-content a {
            color: white;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
        }

        .dropdown-content a:hover {
            background-color: #333;
            color: var(--primary-yellow);
        }

        /* Chat Area */
        .chat-container {
            width: 90%;
            max-width: 800px;
            margin-top: 20px;
        }

        #chat-box {
            height: 400px;
            overflow-y: auto;
            border: 1px solid #333;
            padding: 20px;
            border-radius: 12px;
            background: #1e1e1e;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        input[type="text"] {
            flex-grow: 1;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #222;
            color: white;
        }

        .send-btn {
            padding: 10px 25px;
            background: var(--primary-yellow);
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Prompt Suggestions */
        .suggestions-container {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .suggestion-chip {
            background: #222;
            color: var(--text-light);
            border: 1px solid #444;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .suggestion-chip:hover {
            border-color: var(--primary-yellow);
            color: var(--primary-yellow);
        }
    </style>
</head>
<body>

    <button class="menu-btn" onclick="toggleMenu()">☰ Menu</button>
    <div id="myDropdown" class="dropdown-content">
        <a href="/">Homepage</a>
        <a href="/" onclick="location.reload();">New Chat</a>
        <a href="/games">Games</a>
        <a href="/login">Admin Dashboard</a>
    </div>

    <h1>Alley Empire AI</h1>

    <div id="membership-container">
        <p id="membership-text">Day Pass: $5</p>
    </div>

    <div class="chat-container">
        <div id="chat-box">
            <p><i>The Beast is listening... How can I assist your sovereignty today?</i></p>
        </div>

        <div class="input-group">
            <input type="text" id="chat-input" placeholder="Ask me anything...">
            <button class="send-btn" id="send-button" onclick="handleSend()">Send</button>
        </div>

        <div class="suggestions-container">
            <div class="suggestion-chip" onclick="quickPrompt('Tell me about digital sovereignty')">What is Sovereignty?</div>
            <div class="suggestion-chip" onclick="quickPrompt('How do I become a domain registrar?')">Become a Registrar</div>
            <div class="suggestion-chip" onclick="quickPrompt('Explain the Alley Agent capabilities')">Agent Capabilities</div>
        </div>
    </div>

    <script>
        // 1. Membership Rotation Logic
        const plans = [
            "Day Pass: $5", 
            "Weekly Access: $25", 
            "Monthly VIP: $50", 
            "3-Month Elite: $100", 
            "Annual Sovereign: $200"
        ];
        let planIndex = 0;

        setInterval(() => {
            const textEl = document.getElementById('membership-text');
            textEl.style.opacity = 0;
            setTimeout(() => {
                planIndex = (planIndex + 1) % plans.length;
                textEl.innerText = plans[planIndex];
                textEl.style.opacity = 1;
            }, 500);
        }, 5000);

        // 2. Menu Toggle Logic
        function toggleMenu() {
            const dropdown = document.getElementById("myDropdown");
            dropdown.style.display = dropdown.style.display === "block" ? "none" : "block";
        }

        // 3. Prompt Suggestion Logic
        function quickPrompt(text) {
            document.getElementById('chat-input').value = text;
            handleSend();
        }

        // 4. Send Logic (Placeholder - connects to your backend)
        function handleSend() {
            const input = document.getElementById('chat-input');
            const message = input.value;
            if (!message) return;
            
            const chatBox = document.getElementById('chat-box');
            chatBox.innerHTML += `<p><b>You:</b> ${message}</p>`;
            input.value = '';
            
            // Your existing AJAX/Fetch call to /chat would go here
        }

        // Close menu if clicked outside
        window.onclick = function(event) {
            if (!event.target.matches('.menu-btn')) {
                document.getElementById("myDropdown").style.display = "none";
            }
        }
    </script>
</body>
</html>
