<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alley Empire | Digital Sovereignty Engine</title>
    <style>
        :root {
            --primary-yellow: #ffcc00;
            --bg-dark: #121212;
            --text-light: #e0e0e0;
            --accent-dark: #1e1e1e;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Membership Yellow Box */
        #membership-container {
            width: 90%;
            max-width: 600px;
            background-color: var(--primary-yellow);
            color: black;
            padding: 15px;
            margin: 20px 0;
            border-radius: 12px;
            text-align: center;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(255, 204, 0, 0.3);
        }

        #membership-text {
            margin: 0;
            font-size: 1.3rem;
            transition: opacity 0.5s ease;
        }

        /* Floating Menu */
        .menu-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: #333;
            border: 2px solid var(--primary-yellow);
            color: white;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            z-index: 1000;
        }

        .dropdown-content {
            display: none;
            position: fixed;
            top: 65px;
            left: 20px;
            background-color: var(--accent-dark);
            min-width: 160px;
            border: 1px solid var(--primary-yellow);
            border-radius: 8px;
            z-index: 1000;
        }

        .dropdown-content a {
            color: white;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
        }

        .dropdown-content a:hover {
            background-color: #333;
            color: var(--primary-yellow);
        }

        /* Chat Area */
        .chat-container {
            width: 90%;
            max-width: 800px;
            margin-top: 10px;
        }

        #chat-box {
            height: 350px;
            overflow-y: auto;
            border: 1px solid #333;
            padding: 20px;
            border-radius: 12px;
            background: var(--accent-dark);
            margin-bottom: 15px;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex-grow: 1;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #222;
            color: white;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: var(--primary-yellow);
        }

        .send-btn {
            padding: 10px 25px;
            background: var(--primary-yellow);
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Prompt Suggestion Chips */
        .suggestions-wrapper {
            text-align: center;
            margin-top: 15px;
        }

        .prompt-container {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            min-height: 40px;
        }

        .suggestion-chip {
            background: #222;
            color: var(--text-light);
            border: 1px solid #444;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
            animation: fadeIn 0.5s;
        }

        .suggestion-chip:hover {
            border-color: var(--primary-yellow);
            color: var(--primary-yellow);
            background: #2a2a2a;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <button class="menu-btn" onclick="toggleMenu()">☰ Menu</button>
    <div id="myDropdown" class="dropdown-content">
        <a href="/">Homepage</a>
        <a href="/" onclick="location.reload();">New Chat</a>
        <a href="/games">Games</a>
        <a href="/login">Admin Dashboard</a>
    </div>

    <h1>Alley Empire AI</h1>

    <div id="membership-container">
        <p id="membership-text">Day Pass: $5</p>
    </div>

    <div class="chat-container">
        <div id="chat-box">
            <p style="color: #888;"><i>The Beast is listening... How can I assist your sovereignty today?</i></p>
        </div>

        <div class="input-group">
            <input type="text" id="chat-input" placeholder="Ask me anything...">
            <button class="send-btn" id="send-button" onclick="handleSend()">Send</button>
        </div>

        <div class="suggestions-wrapper">
            <p style="font-size: 0.75rem; color: #666; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px;">Trending Suggestions</p>
            <div id="prompt-container" class="prompt-container">
                </div>
        </div>
    </div>

    <script>
        // 1. Membership Rotation Logic
        const plans = [
            "Day Pass: $5", 
            "Weekly Access: $25", 
            "Monthly VIP: $50", 
            "3-Month Elite: $100", 
            "Annual Sovereign: $200"
        ];
        let planIndex = 0;
        setInterval(() => {
            const textEl = document.getElementById('membership-text');
            textEl.style.opacity = 0;
            setTimeout(() => {
                planIndex = (planIndex + 1) % plans.length;
                textEl.innerText = plans[planIndex];
                textEl.style.opacity = 1;
            }, 500);
        }, 5000);

        // 2. Dynamic Prompt Suggestions (Top 20 Cycle)
        const trendingPrompts = [
            "How does AI work?", "Write a poem about coding", "Best way to learn Python",
            "Explain Digital Sovereignty", "How to host a local LLM?", "Summarize the news",
            "Create a workout plan", "Healthy dinner ideas", "How to use Cloudflare tunnels",
            "What is the Beast AI?", "Write a business plan", "Top crypto trends 2026",
            "How to be a domain registrar", "Fix Linux broken packages", "AI vs Human creativity",
            "Explain quantum computing", "History of the internet", "Best games on Steam",
            "How to secure a home server", "Future of open source"
        ];

        function updatePrompts() {
            const container = document.getElementById('prompt-container');
            container.innerHTML = ''; 
            const shuffled = trendingPrompts.sort(() => 0.5 - Math.random());
            const selected = shuffled.slice(0, 3);

            selected.forEach(text => {
                const div = document.createElement('div');
                div.innerText = text;
                div.className = 'suggestion-chip';
                div.onclick = () => quickPrompt(text);
                container.appendChild(div);
            });
        }
        setInterval(updatePrompts, 8000);
        updatePrompts();

        // 3. UI Functionality
        function toggleMenu() {
            const dropdown = document.getElementById("myDropdown");
            dropdown.style.display = dropdown.style.display === "block" ? "none" : "block";
        }

        function quickPrompt(text) {
            document.getElementById('chat-input').value = text;
            handleSend();
        }

        function handleSend() {
            const input = document.getElementById('chat-input');
            const message = input.value.trim();
            if (!message) return;
            
            const chatBox = document.getElementById('chat-box');
            chatBox.innerHTML += `<div style="margin-bottom:10px;"><b>You:</b> ${message}</div>`;
            input.value = '';
            
            // Auto-scroll to bottom
            chatBox.scrollTop = chatBox.scrollHeight;

            // Trigger your existing backend fetch here:
            // fetch('/chat', { method: 'POST', body: JSON.stringify({prompt: message}) }) ...
        }

        window.onclick = function(event) {
            if (!event.target.matches('.menu-btn')) {
                document.getElementById("myDropdown").style.display = "none";
            }
        }
    </script>
</body>
</html>
