<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alleyesonme-Ai</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="dark-theme">
    <div class="container">
        <div class="logo">A</div>
        <h1>Alleyesonme-Ai</h1>
        
        <div class="chat-container">
            <input type="text" id="userInput" placeholder="What's the capital of Florida">
            <button onclick="sendPrompt()">→</button>
        </div>
        <div id="responseBox" class="response-card" style="display:none;"></div>

        {% if not role %}
            <div class="membership-card">
                <button class="gold-btn">Purchase Membership Now!</button>
                <p>Plans starting at $25/week</p>
                <p>Already have an account? <a href="/login">Sign In</a></p>
            </div>
        {% endif %}

        {% if role == 'admin' %}
            <div class="admin-panel">
                <h3>< > Developer Mode</h3>
                <p>System check. Respond with 'The Beast is Awake'.</p>
                <button class="execute-btn">▷ Execute</button>
                
                <h3>Change Admin Password</h3>
                <input type="password" placeholder="Enter current password">
                <a href="/logout" style="color:red; display:block; margin-top:10px;">Logout</a>
            </div>
        {% endif %}
    </div>

    <script>
        async function sendPrompt() {
            const msg = document.getElementById('userInput').value;
            const box = document.getElementById('responseBox');
            box.style.display = 'block';
            box.innerText = "Processing...";

            const res = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: msg})
            });
            const data = await res.json();
            box.innerText = data.agent_response;
        }
    </script>
</body>
</html>
