<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alleyesonme-Ai | AI Agent</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        /* Small addition to handle the response display */
        #chat-display {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            min-height: 50px;
        }
    </style>
</head>
<body class="dark-theme">
    <div class="container">
        <header>
            <div class="logo-icon">A</div>
            <h1>Alleyesonme-Ai</h1>
            <p>Your personal AI assistant — powered by advanced AI.</p>
        </header>

        <main>
            <div class="chat-input-container">
                <input type="text" id="userInput" placeholder="Ask me anything! I'm here to help">
                <button id="sendBtn" class="gradient-btn">→</button>
            </div>

            <div id="chat-display" style="display:none;"></div>

            <div class="action-grid">
                <div class="action-card" onclick="setInput('Create a workout plan')"><span>💪</span> Create a workout plan</div>
                <div class="action-card" onclick="setInput('Help me plan a trip')"><span>✈️</span> Help me plan a trip</div>
                <div class="action-card" onclick="setInput('Write a business plan')"><span>💰</span> Write a business plan</div>
                <div class="action-card" onclick="setInput('Write a cover letter')"><span>📝</span> Write a cover letter</div>
            </div>
        </main>
    </div>

    <script>
        const sendBtn = document.getElementById('sendBtn');
        const userInput = document.getElementById('userInput');
        const chatDisplay = document.getElementById('chat-display');

        function setInput(text) {
            userInput.value = text;
        }

        async function sendMessage() {
            const message = userInput.value;
            if (!message) return;

            chatDisplay.style.display = 'block';
            chatDisplay.innerText = 'Thinking...';
            userInput.value = '';

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });
                const data = await response.json();
                chatDisplay.innerText = data.agent_response;
            } catch (err) {
                chatDisplay.innerText = 'Error connecting to the Beast.';
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
